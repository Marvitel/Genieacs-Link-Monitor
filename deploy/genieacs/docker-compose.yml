services:
  mongodb:
    image: mongo:4.4
    container_name: genieacs-mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=genieacs
    networks:
      - genieacs
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  genieacs-cwmp:
    image: node:18-slim
    container_name: genieacs-cwmp
    restart: always
    working_dir: /opt/genieacs
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "7547"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_CWMP_ACCESS_LOG_FILE=/var/log/genieacs/cwmp-access.log
      - GENIEACS_EXT_DIR=/opt/genieacs/ext
    volumes:
      - genieacs_app:/opt/genieacs
      - genieacs_ext:/opt/genieacs/ext
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["/bin/sh", "-c", "npm install -g genieacs@1.2.13 && mkdir -p /var/log/genieacs /opt/genieacs/ext && genieacs-cwmp"]
    networks:
      - genieacs

  genieacs-nbi:
    image: node:18-slim
    container_name: genieacs-nbi
    restart: always
    working_dir: /opt/genieacs
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "7557:7557"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_NBI_ACCESS_LOG_FILE=/var/log/genieacs/nbi-access.log
    volumes:
      - genieacs_app:/opt/genieacs
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["/bin/sh", "-c", "npm install -g genieacs@1.2.13 && mkdir -p /var/log/genieacs && genieacs-nbi"]
    networks:
      - genieacs

  genieacs-fs:
    image: node:18-slim
    container_name: genieacs-fs
    restart: always
    working_dir: /opt/genieacs
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "7567:7567"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_FS_ACCESS_LOG_FILE=/var/log/genieacs/fs-access.log
      - GENIEACS_FS_HOSTNAME=${FS_HOSTNAME:-191.52.255.46}
      - GENIEACS_FS_PORT=7567
    volumes:
      - genieacs_app:/opt/genieacs
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["/bin/sh", "-c", "npm install -g genieacs@1.2.13 && mkdir -p /var/log/genieacs && genieacs-fs"]
    networks:
      - genieacs

  genieacs-ui:
    image: node:18-slim
    container_name: genieacs-ui
    restart: always
    working_dir: /opt/genieacs
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_UI_ACCESS_LOG_FILE=/var/log/genieacs/ui-access.log
    volumes:
      - genieacs_app:/opt/genieacs
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["/bin/sh", "-c", "npm install -g genieacs@1.2.13 && mkdir -p /var/log/genieacs && genieacs-ui"]
    networks:
      - genieacs

  nginx:
    image: nginx:alpine
    container_name: genieacs-nginx
    restart: always
    depends_on:
      - genieacs-cwmp
    ports:
      - "7547:7547"
      - "80:80"
    volumes:
      - ./nginx/cwmp.conf:/etc/nginx/conf.d/default.conf
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    networks:
      - genieacs

  certbot:
    image: certbot/certbot
    container_name: genieacs-certbot
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"
    networks:
      - genieacs

volumes:
  mongo_data:
  genieacs_app:
  genieacs_ext:
  genieacs_logs:
  letsencrypt_data:
  certbot_webroot:

networks:
  genieacs:
    driver: bridge
