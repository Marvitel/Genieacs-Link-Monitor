worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream netcontrol_panel {
        server netcontrol-panel:5000;
    }

    upstream genieacs_cwmp {
        server genieacs-cwmp:7547;
    }

    upstream genieacs_nbi {
        server genieacs-nbi:7557;
    }

    upstream genieacs_ui {
        server genieacs-ui:3000;
    }

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://netcontrol_panel;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /genieacs-ui/ {
            rewrite ^/genieacs-ui/(.*) /$1 break;
            proxy_pass http://genieacs_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 7547;
        server_name _;

        location / {
            proxy_pass http://genieacs_cwmp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
