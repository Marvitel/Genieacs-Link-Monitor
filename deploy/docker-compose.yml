version: "3.8"

services:
  mongodb:
    image: mongo:4.4
    container_name: netcontrol-mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
      - ./mongo/mongod.conf:/etc/mongod.conf
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=genieacs
    networks:
      - netcontrol
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongo --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  genieacs-cwmp:
    image: genieacs/genieacs:latest
    container_name: netcontrol-cwmp
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "7547:7547"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_CWMP_ACCESS_LOG_FILE=/var/log/genieacs/cwmp-access.log
      - GENIEACS_CWMP_LOG_FILE=/var/log/genieacs/cwmp.log
      - GENIEACS_EXT_DIR=/opt/genieacs/ext
      - GENIEACS_CWMP_SSL=false
    volumes:
      - genieacs_ext:/opt/genieacs/ext
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["genieacs-cwmp"]
    networks:
      - netcontrol

  genieacs-nbi:
    image: genieacs/genieacs:latest
    container_name: netcontrol-nbi
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "7557:7557"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_NBI_ACCESS_LOG_FILE=/var/log/genieacs/nbi-access.log
      - GENIEACS_NBI_LOG_FILE=/var/log/genieacs/nbi.log
    volumes:
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["genieacs-nbi"]
    networks:
      - netcontrol

  genieacs-fs:
    image: genieacs/genieacs:latest
    container_name: netcontrol-fs
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "7567:7567"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_FS_ACCESS_LOG_FILE=/var/log/genieacs/fs-access.log
      - GENIEACS_FS_LOG_FILE=/var/log/genieacs/fs.log
    volumes:
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["genieacs-fs"]
    networks:
      - netcontrol

  genieacs-ui:
    image: genieacs/genieacs:latest
    container_name: netcontrol-ui
    restart: always
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      - GENIEACS_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/genieacs
      - GENIEACS_UI_ACCESS_LOG_FILE=/var/log/genieacs/ui-access.log
      - GENIEACS_UI_LOG_FILE=/var/log/genieacs/ui.log
    volumes:
      - genieacs_logs:/var/log/genieacs
    entrypoint: ["genieacs-ui"]
    networks:
      - netcontrol

  postgres:
    image: postgres:16-alpine
    container_name: netcontrol-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=netcontrol
      - POSTGRES_USER=netcontrol
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-netcontrol_secure_2024}
    ports:
      - "5432:5432"
    networks:
      - netcontrol
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netcontrol"]
      interval: 10s
      timeout: 5s
      retries: 5

  netcontrol-panel:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: netcontrol-panel
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      genieacs-nbi:
        condition: service_started
    ports:
      - "3000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://netcontrol:${POSTGRES_PASSWORD:-netcontrol_secure_2024}@postgres:5432/netcontrol
      - SESSION_SECRET=${SESSION_SECRET:-change_me_in_production}
      - GENIEACS_NBI_URL=http://genieacs-nbi:7557
      - GENIEACS_CWMP_URL=http://genieacs-cwmp:7547
      - LINKMONITOR_URL=${LINKMONITOR_URL:-}
      - LINKMONITOR_API_KEY=${LINKMONITOR_API_KEY:-}
    networks:
      - netcontrol

  nginx:
    image: nginx:alpine
    container_name: netcontrol-nginx
    restart: always
    depends_on:
      - netcontrol-panel
      - genieacs-cwmp
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - netcontrol

volumes:
  mongo_data:
  postgres_data:
  genieacs_ext:
  genieacs_logs:

networks:
  netcontrol:
    driver: bridge
